name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/llama-index-tools-ejentum/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify version matches tag
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match git tag ($TAG_VERSION). Bump pyproject.toml before tagging."
            exit 1
          fi
          echo "Version match OK: $PYPROJECT_VERSION"

      - name: Build sdist + wheel
        run: python -m build

      - name: List built artifacts
        run: ls -la dist/

      - name: Publish to PyPI (via Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
